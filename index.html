<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de gestión de tareas</title>

    <!-- Enlace a Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Favicon -->
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">

</head>

<body class="bg-light">
    <div class="container mt-3">
        <div class="row">
            <div class="col-md-6 offset-md-3 text-center">
                <img src="img/logo.png" alt="Logo" class="mb-4 mt-3" href="index.html" style="max-width: 180px;">
                <h1 class="display-4">Bienvenido al Simulador de Gestión de Tareas</h1>
                <p class="lead">Este simulador te ayuda a organizar y gestionar tus tareas diarias de manera efectiva.
                </p>
                <hr class="my-4">
                <p>Haz click en "Comenzar" para iniciar el simulador.</p>
                <button class="btn btn-primary btn-lg" onclick="iniciarGestorTareas()">Comenzar</button>
            </div>
        </div>
    </div>

    <!-- JS Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>

</body>

</html>
